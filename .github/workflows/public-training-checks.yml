name: Public Training Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate four-level training package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu -r requirements-ci.txt

      - name: Validate package structure and public surface
        run: |
          python skills/research-code-audit-training/scripts/validate_training_package.py \
            LLM4SBR_research_audit_training_v2

      - name: Run Level 1-4 public regression checks
        run: |
          python LLM4SBR_research_audit_training_v2/run_all_public_checks.py
